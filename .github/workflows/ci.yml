name: CI
on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
           dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      - run: dotnet test --no-build --configuration Release
  
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taskapp-web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: taskapp-web/package-lock.json
      - run: npm ci
      - run: npm run build

  deploy:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, taskapp]
    steps:
      - name: Pull latest and redeploy
        run: |
          cd ~/Projects/ASP.NET/TaskApp/
          git pull
          docker compose up -d --build
