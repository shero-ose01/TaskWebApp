services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - taskapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES}
      Email__Host: ${Email__Host}
      Email__Port: ${Email__Port}
      Email__Security: ${Email__Security}
      Email__Username: ${Email__Username}
      Email__Password: ${Email__Password}
      Email__FromAddress: ${Email__FromAddress}
      Email__FromName: ${Email__FromName}
      Frontend__BaseURL: ${Frontend__BaseURL}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - dataprotection-keys:/home/app/.aspnet/DataProtection-Keys
    networks:
      - taskapp-net
  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    networks:
      - taskapp-net
    ports:
      - "127.0.0.1:8025:8025" # web UI, localhost only
  web:
    build:
      context: ./taskapp-web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - api
    networks:
      - taskapp-net

volumes:
  postgres-data:
  dataprotection-keys:

networks:
  taskapp-net:
